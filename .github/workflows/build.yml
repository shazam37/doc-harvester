name: Build Distributables

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: "dist/*.zip\ndist/*.exe"
          - os: macos-latest
            platform: mac
            artifact: "dist/*.zip\ndist/*.dmg"
          - os: ubuntu-latest
            platform: linux
            artifact: "dist/*.zip\ndist/*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (${{ matrix.platform }})
        run: npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Suppress code-signing for unsigned team builds.
          # Remove these lines and add your certificates to sign properly.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DocHarvester-${{ matrix.platform }}
          path: |
            dist/*.zip
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
          if-no-files-found: warn

  # Creates a GitHub Release and attaches all zips when a version tag is pushed
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
