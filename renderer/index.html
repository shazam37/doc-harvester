<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>Doc Harvester</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="12" y1="18" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <polyline points="9 15 12 18 15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Doc Harvester</span>
        </div>
        <span class="header-subtitle">Google Document Downloader</span>
      </div>
    </header>

    <!-- Main -->
    <main class="main">

      <!-- Config Card -->
      <section class="card">
        <h2 class="section-title">Search Configuration</h2>

        <div class="form-group">
          <label for="keyword" class="label">Search Keyword</label>
          <input
            type="text"
            id="keyword"
            class="input"
            placeholder="e.g. Pfizer annual report 2023"
            autocomplete="off"
            spellcheck="false"
          />
          <span class="hint">Enter search terms — file type filters below are added automatically</span>
        </div>

        <div class="form-row">
          <div class="form-group flex-1">
            <label class="label">File Types</label>
            <div class="checkbox-group" id="fileTypeGroup">
              <label class="chip"><input type="checkbox" value="pdf" checked> PDF</label>
              <label class="chip"><input type="checkbox" value="docx" checked> DOCX</label>
              <label class="chip"><input type="checkbox" value="doc"> DOC</label>
              <label class="chip"><input type="checkbox" value="xlsx"> XLSX</label>
              <label class="chip"><input type="checkbox" value="xls"> XLS</label>
              <label class="chip"><input type="checkbox" value="pptx"> PPTX</label>
              <label class="chip"><input type="checkbox" value="ppt"> PPT</label>
            </div>
          </div>

          <div class="form-group" style="min-width: 150px;">
            <label for="maxDownloads" class="label">Max Downloads</label>
            <input
              type="number"
              id="maxDownloads"
              class="input"
              value="10"
              min="1"
              max="100"
            />
          </div>
        </div>

        <div class="form-group">
          <label class="label">Output Folder</label>
          <div class="dir-row">
            <input
              type="text"
              id="outputDir"
              class="input dir-input"
              placeholder="Select a folder to save downloaded files..."
              readonly
            />
            <button id="browseBtn" class="btn btn-secondary">Browse...</button>
          </div>
        </div>

        <div class="actions">
          <button id="startBtn" class="btn btn-primary btn-lg">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            Start Download
          </button>
          <button id="stopBtn" class="btn btn-danger btn-lg" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
            </svg>
            Stop
          </button>
          <button id="openFolderBtn" class="btn btn-ghost btn-lg" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            Open Folder
          </button>
        </div>
      </section>

      <!-- Progress Card -->
      <section class="card">
        <div class="progress-header">
          <h2 class="section-title" style="margin-bottom:0">Progress</h2>
          <span id="progressCount" class="progress-count">0 / 0</span>
        </div>

        <div class="progress-track">
          <div id="progressBar" class="progress-fill" style="width: 0%"></div>
        </div>

        <p id="statusText" class="status-text">Ready to start</p>

        <div class="results-header">
          <span class="results-label">Download Log</span>
          <button id="clearBtn" class="btn btn-ghost btn-sm">Clear</button>
        </div>

        <div id="resultsList" class="results-list">
          <div class="results-empty">No results yet. Configure settings above and click Start Download.</div>
        </div>
      </section>

    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
